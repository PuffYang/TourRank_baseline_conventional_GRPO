tools:
  - class_name: verl.tools.dr_tulu_search_tools.GoogleSearchTool
    config:
      type: native
      timeout: 30
      backend: runway
      url: https://runway.devops.xiaohongshu.com/openai/zhipu/paas/v4/web_search
      api_key_env: RUNWAY_WEB_SEARCH_API_KEY
      search_engine: search_prime
      query_rewrite: "false"

  - class_name: verl.tools.dr_tulu_search_tools.SnippetSearchTool
    config:
      type: native
      timeout: 20
      limit: 5
      min_interval_seconds: 1.1
      serialize_requests: true
      max_retries: 3
      retry_backoff_seconds: 1.0
      fallback_on_missing_api_key: false
      fallback_on_request_error: false
      fallback_message: Semantic Scholar API is unavailable, so this placeholder snippet is returned only for debugging the training pipeline.

  - class_name: verl.tools.dr_tulu_search_tools.BrowseWebpageTool
    config:
      type: native
      timeout: 30
